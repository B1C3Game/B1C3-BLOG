<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1e2d3d"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
    <radialGradient id="cn" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#4b5b6b"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </radialGradient>
    <radialGradient id="nl" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f5efe4"/>
      <stop offset="100%" stop-color="#c7d3dd"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- spokes -->
  <line x1="16" y1="16" x2="5"  y2="8"  stroke="#8fa4b7" stroke-width="1.2" opacity="0.7"/>
  <line x1="16" y1="16" x2="27" y2="7"  stroke="#8fa4b7" stroke-width="1.2" opacity="0.7"/>
  <line x1="16" y1="16" x2="6"  y2="26" stroke="#8fa4b7" stroke-width="1.2" opacity="0.7"/>
  <line x1="16" y1="16" x2="27" y2="25" stroke="#8fa4b7" stroke-width="1.2" opacity="0.7"/>
  <!-- satellite nodes -->
  <circle cx="5"  cy="8"  r="2.2" fill="url(#nl)"/>
  <circle cx="27" cy="7"  r="2.2" fill="url(#nl)"/>
  <circle cx="6"  cy="26" r="2.2" fill="url(#nl)"/>
  <circle cx="27" cy="25" r="2.2" fill="url(#nl)"/>
  <!-- center node -->
  <circle cx="16" cy="16" r="4.5" fill="url(#cn)" stroke="#8fa4b7" stroke-width="0.8"/>
</svg>
